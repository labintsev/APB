<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Главная{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="page-wrapper">
        <!-- Header -->
        <header class="site-header">
            <div class="nav-container">
                <div class="site-brand">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="logo" class="logo">
                    <div>
                        <div class="brand-name"><a class="btn" href="{{ url_for('index') }}">Объединение Радиовещателей</a></div>
                        <div class="brand-sub small">Калькулятор покрытия рекламой</div>
                    </div>
                </div>

                <nav class="page-nav">
                    <a class="btn" href="{{ url_for('region.region_coverage') }}">Покрытие</a>
                    <a class="btn" href="{{ url_for('region.region_list') }}">Регионы</a>
                    <a class="btn" href="{{ url_for('org.org_list') }}">Организации</a>
                    <a class="btn" href="{{ url_for('broadcast.broadcast_list') }}">СМИ и районы</a>
                </nav>
                {% if session.get('username') %}
                <div style="margin-left: auto; display: flex; align-items: center; gap: 15px;">
                    <span style="color: #666;">{{ session.get('username') }}</span>
                    <a class="btn" href="{{ url_for('auth.logout') }}" style="background-color: #dc3545; color: white;">Выход</a>
                </div>
                {% else %}
                <div style="margin-left: auto; display: flex; gap: 10px;">
                    <a class="btn" href="{{ url_for('auth.login') }}">Вход</a>
                    <a class="btn" href="{{ url_for('auth.register') }}" style="background-color: #28a745; color: white;">Регистрация</a>
                </div>
                {% endif %}
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            {% block content %}{% endblock %}
        </main>

    </div>
    {% block scripts %}{% endblock %}
</body>

</html>

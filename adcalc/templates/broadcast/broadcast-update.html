{% extends "base.html" %}

{% block title %}Редактировать трансляцию{% endblock %}

{% block content %}
<div class="container">
  <div class="card">
    <h2>Редактировать трансляцию</h2>
    <form method="POST" action="{{ url_for('broadcast.broadcast_update', broadcast_id=broadcast.id) }}">

      <div class="form-group">
        <label for="org_id">Организация</label>
        <select id="org_id" name="org_id" class="form-control" required>
          {% for org in organisations %}
          <option value="{{ org.id }}" {% if org.id==broadcast.org_id %}selected{% endif %}>{{ org.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="smi_name">СМИ (название)</label>
        <input type="text" id="smi_name" name="smi_name" class="form-control" value="{{ broadcast.smi_name or '' }}">
        <select class="form-control mt-2" onchange="document.getElementById('smi_name').value=this.value;">
          <option value="">-- выбрать --</option>
          {% for s in smis %}
          <option value="{{ s }}" {% if s==broadcast.smi_name %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-row">
        <div class="form-group col-md-4">
          <label for="smi_rating">Рейтинг СМИ (%)</label>
          <input type="number" step="0.1" id="smi_rating" name="smi_rating" class="form-control" value="{{ broadcast.smi_rating or '' }}">
        </div>
        <div class="form-group col-md-4">
          <label for="smi_male_proportion">Доля мужчин (%)</label>
          <input type="number" step="0.1" id="smi_male_proportion" name="smi_male_proportion" class="form-control" value="{{ broadcast.smi_male_proportion or '' }}">
        </div>
      </div>

      <div class="form-group">
        <label for="district_name">Район (название)</label>
        <input type="text" id="district_name" name="district_name" class="form-control" value="{{ broadcast.district_name or '' }}">
        <select class="form-control mt-2" onchange="document.getElementById('district_name').value=this.value;">
          <option value="">-- выбрать --</option>
          {% for d in districts %}
          <option value="{{ d }}" {% if d==broadcast.district_name %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="district_population">Население района (чел.)</label>
        <input type="number" id="district_population" name="district_population" class="form-control" value="{{ broadcast.district_population or '' }}">
      </div>

      <div class="form-group">
        <label for="region_id">Регион</label>
        <select id="region_id" name="region_id" class="form-control" required>
          {% for region in regions %}
          <option value="{{ region.id }}" {% if region.id==broadcast.region_id %}selected{% endif %}>{{ region.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="frequency">Частота</label>
        <input type="text" id="frequency" name="frequency" class="form-control" value="{{ broadcast.frequency or '' }}">
      </div>

      <div class="form-group">
        <label for="power">Мощность</label>
        <input type="number" step="0.01" id="power" name="power" class="form-control" value="{{ broadcast.power or '' }}">
      </div>

      <button class="btn btn-primary" type="submit">Сохранить</button>
      <a class="btn btn-secondary" href="{{ url_for('broadcast.broadcast_list') }}">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}

<style>
  .organisations-selector {
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 15px;
    background-color: #f9f9f9;
  }
  
  .org-item {
    margin-bottom: 10px;
    padding: 10px;
    border: 1px solid #eee;
    border-radius: 3px;
    background-color: white;
  }
  
  .org-header {
    display: flex;
    align-items: center;
    cursor: pointer;
    font-weight: bold;
    user-select: none;
  }
  
  .org-header:hover {
    background-color: #f0f0f0;
  }
  
  .org-header input[type="checkbox"] {
    margin-right: 10px;
  }
  
  .org-toggle {
    margin-left: 10px;
    color: #666;
    font-size: 12px;
  }
  
  .org-cost {
    margin-left: auto;
    color: #666;
    font-size: 14px;
  }
  
  .broadcasts-list {
    display: none;
    margin-top: 10px;
    padding-left: 30px;
    border-left: 2px solid #ddd;
  }
  
  .broadcasts-list.expanded {
    display: block;
  }
  
  .broadcast-item {
    margin-bottom: 8px;
    padding: 8px;
    background-color: #f5f5f5;
    border-radius: 3px;
    font-size: 14px;
  }
  
  .broadcast-item input[type="checkbox"] {
    margin-right: 8px;
  }
  
  .broadcast-info {
    color: #666;
    font-size: 13px;
  }
  
  .select-all-container {
    margin-bottom: 15px;
    padding: 10px;
    background-color: #e8f4f8;
    border: 1px solid #b3d9e6;
    border-radius: 3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .select-all-container input[type="checkbox"] {
    margin: 0;
  }
  
  .select-all-container label {
    margin: 0;
    font-weight: bold;
    cursor: pointer;
  }

  .results-toggle {
    border: none;
    background: transparent;
    cursor: pointer;
    color: #666;
    margin-right: 8px;
    padding: 0;
    font-size: 12px;
  }

  .results-broadcast-row {
    display: none;
  }

  .results-broadcast-row td {
    background-color: #f5f5f5;
    font-size: 13px;
    color: #555;
  }

  .results-broadcast-row td:first-child {
    padding-left: 2.5em;
  }
</style>

<div class="container">
  <div class="card">
    <h1>Калькулятор</h1>
    
    <div class="organisations-selector">
      <h3>Выберите организации для распределения бюджета:</h3>
      <div class="select-all-container">
        <input type="checkbox" id="selectAllCheckbox">
        <label for="selectAllCheckbox">Выбрать / Снять выделение со всех</label>
      </div>
      <div id="organisationsList">
        <p>Загрузка организаций...</p>
      </div>
    </div>
    
    <form id="budgetForm">
      <div class="form-group">
        <label for="budget">Рекламный бюджет (т.р.):</label>
        <input type="number" id="budget" name="budget" step="0.01" required>
      </div>
      <button type="submit" class="btn btn-primary">Рассчитать</button>
    </form>
    
    <div id="results" class="results" style="display: none;">
      <h2>Распределение бюджета</h2>
      <table class="app-table">
        <thead>
          <tr>
            <th>Организация</th>
            <th>Цена 1 секунды</th>
            <th>Доля бюджета</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let organisationsData = [];

// Load organizations on page load
async function loadOrganisations() {
  try {
    const response = await fetch('/api/organisations-detailed');
    organisationsData = await response.json();
    renderOrganisationsList();
  } catch (error) {
    console.error('Error loading organisations:', error);
    document.getElementById('organisationsList').innerHTML = '<p>Ошибка при загрузке организаций</p>';
  }
}

function renderOrganisationsList() {
  const listContainer = document.getElementById('organisationsList');
  listContainer.innerHTML = '';
  
  // Reset select-all checkbox
  document.getElementById('selectAllCheckbox').checked = false;
  
  organisationsData.forEach(org => {
    const orgItem = document.createElement('div');
    orgItem.className = 'org-item';
    orgItem.dataset.orgId = org.id;
    
    const orgHeader = document.createElement('div');
    orgHeader.className = 'org-header';
    
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'org-checkbox';
    checkbox.dataset.orgId = org.id;
    checkbox.addEventListener('change', (e) => {
      toggleOrgBroadcasts(org.id, e.target.checked);
      updateSelectAllCheckbox();
    });
    
    const label = document.createElement('span');
    label.textContent = org.name;
    
    const toggle = document.createElement('span');
    toggle.className = 'org-toggle';
    toggle.textContent = org.broadcasts.length > 0 ? '▶' : '(нет трансляций)';
    
    const cost = document.createElement('span');
    cost.className = 'org-cost';
    cost.textContent = org.broadcasts.length > 0 ? `${org.cost.toFixed(1)} р.` : '';
    
    orgHeader.appendChild(checkbox);
    orgHeader.appendChild(label);
    if (org.broadcasts.length > 0) {
      orgHeader.appendChild(toggle);
    }
    orgHeader.appendChild(cost);
    
    orgHeader.addEventListener('click', (e) => {
      if (e.target !== checkbox && org.broadcasts.length > 0) {
        toggleBroadcastsList(org.id);
      }
    });
    
    orgItem.appendChild(orgHeader);
    
    if (org.broadcasts.length > 0) {
      const broadcastsList = document.createElement('div');
      broadcastsList.className = 'broadcasts-list';
      broadcastsList.dataset.orgId = org.id;
      
      org.broadcasts.forEach(broadcast => {
        const broadcastItem = document.createElement('div');
        broadcastItem.className = 'broadcast-item';
        
        const broadcastCheckbox = document.createElement('input');
        broadcastCheckbox.type = 'checkbox';
        broadcastCheckbox.className = 'broadcast-checkbox';
        broadcastCheckbox.dataset.broadcastId = broadcast.id;
        broadcastCheckbox.dataset.orgId = org.id;
        
        const broadcastLabel = document.createElement('span');
        broadcastLabel.textContent = `${broadcast.smi} - ${broadcast.district}`;
        
        const broadcastCost = document.createElement('span');
        broadcastCost.className = 'broadcast-info';
        broadcastCost.textContent = ` (${broadcast.cost.toFixed(1)} р.)`;
        
        broadcastItem.appendChild(broadcastCheckbox);
        broadcastItem.appendChild(broadcastLabel);
        broadcastItem.appendChild(broadcastCost);
        
        broadcastsList.appendChild(broadcastItem);
      });
      
      orgItem.appendChild(broadcastsList);
    }
    
    listContainer.appendChild(orgItem);
  });
}

function toggleBroadcastsList(orgId) {
  const broadcastsList = document.querySelector(`.broadcasts-list[data-org-id="${orgId}"]`);
  const orgHeader = document.querySelector(`.org-item[data-org-id="${orgId}"] .org-header`);
  
  if (broadcastsList) {
    broadcastsList.classList.toggle('expanded');
    const toggle = orgHeader.querySelector('.org-toggle');
    if (toggle) {
      toggle.textContent = broadcastsList.classList.contains('expanded') ? '▼' : '▶';
    }
  }
}

function toggleOrgBroadcasts(orgId, checked) {
  const broadcastsCheckboxes = document.querySelectorAll(`.broadcast-checkbox[data-org-id="${orgId}"]`);
  broadcastsCheckboxes.forEach(cb => {
    cb.checked = checked;
  });
}

function toggleSelectAll(checked) {
  const orgCheckboxes = document.querySelectorAll('.org-checkbox');
  orgCheckboxes.forEach(checkbox => {
    checkbox.checked = checked;
    const orgId = checkbox.dataset.orgId;
    toggleOrgBroadcasts(orgId, checked);
  });
}

function updateSelectAllCheckbox() {
  const orgCheckboxes = document.querySelectorAll('.org-checkbox');
  const selectAllCheckbox = document.getElementById('selectAllCheckbox');
  
  if (orgCheckboxes.length === 0) {
    selectAllCheckbox.checked = false;
    selectAllCheckbox.indeterminate = false;
    return;
  }
  
  const allChecked = Array.from(orgCheckboxes).every(cb => cb.checked);
  const someChecked = Array.from(orgCheckboxes).some(cb => cb.checked);
  
  selectAllCheckbox.checked = allChecked;
  selectAllCheckbox.indeterminate = someChecked && !allChecked;
}

// Calculate selected cost
function getSelectedCost() {
  let totalCost = 0;
  
  document.querySelectorAll('.broadcast-checkbox:checked').forEach(checkbox => {
    const broadcastId = checkbox.dataset.broadcastId;
    const orgId = checkbox.dataset.orgId;
    
    const org = organisationsData.find(o => o.id == orgId);
    if (org) {
      const broadcast = org.broadcasts.find(b => b.id == broadcastId);
      if (broadcast) {
        totalCost += broadcast.cost;
      }
    }
  });
  
  return totalCost;
}

function toggleResultsBroadcasts(orgId) {
  const detailRows = document.querySelectorAll(`.results-broadcast-row[data-org-id="${orgId}"]`);
  const toggle = document.querySelector(`.results-toggle[data-org-id="${orgId}"]`);

  if (!detailRows.length || !toggle) {
    return;
  }

  const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
  detailRows.forEach(row => {
    row.style.display = isExpanded ? 'none' : 'table-row';
  });
  toggle.textContent = isExpanded ? '▶' : '▼';
  toggle.setAttribute('aria-expanded', String(!isExpanded));
}

document.getElementById('budgetForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const budget = parseFloat(document.getElementById('budget').value);
  if (isNaN(budget) || budget <= 0) {
    alert('Пожалуйста, введите корректную сумму бюджета');
    return;
  }
  
  const totalCost = getSelectedCost();
  
  if (totalCost === 0) {
    alert('Пожалуйста, выберите хотя бы одну трансляцию');
    return;
  }
  
  // Build results by organization
  const resultsBody = document.getElementById('resultsBody');
  resultsBody.innerHTML = '';
  
  organisationsData.forEach(org => {
    let orgCost = 0;
    const selectedBroadcasts = [];
    
    org.broadcasts.forEach(broadcast => {
      const checkbox = document.querySelector(`.broadcast-checkbox[data-broadcast-id="${broadcast.id}"][data-org-id="${org.id}"]`);
      if (checkbox && checkbox.checked) {
        orgCost += broadcast.cost;
        selectedBroadcasts.push(broadcast);
      }
    });
    
    if (orgCost > 0) {
      const share = (orgCost / totalCost) * budget;
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>
          <button type="button" class="results-toggle" data-org-id="${org.id}" aria-expanded="false">▶</button>
          ${org.name}
        </td>
        <td>${orgCost.toFixed(1)} р.</td>
        <td>${share.toFixed(1)} т.р.</td>
      `;
      resultsBody.appendChild(row);

      selectedBroadcasts.forEach(broadcast => {
        const broadcastShare = (broadcast.cost / totalCost) * budget;
        const bRow = document.createElement('tr');
        bRow.className = 'results-broadcast-row';
        bRow.dataset.orgId = org.id;
        bRow.innerHTML = `
          <td>${broadcast.smi} — ${broadcast.district}</td>
          <td>${broadcast.cost.toFixed(1)} р.</td>
          <td>${broadcastShare.toFixed(1)} т.р.</td>
        `;
        resultsBody.appendChild(bRow);
      });
    }
  });
  
  document.getElementById('results').style.display = 'block';
});

// Select all checkbox event listener
document.getElementById('selectAllCheckbox').addEventListener('change', (e) => {
  toggleSelectAll(e.target.checked);
});

document.getElementById('resultsBody').addEventListener('click', (e) => {
  const toggle = e.target.closest('.results-toggle');
  if (toggle) {
    toggleResultsBroadcasts(toggle.dataset.orgId);
  }
});

// Load organisations on page load
loadOrganisations();
</script>

{% endblock %}
